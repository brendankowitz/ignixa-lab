name: Backend Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  DOTNET_PROJECT_PATH: backend/src/Ignixa.Lab.Functions/Ignixa.Lab.Functions.csproj
  DOTNET_PUBLISH_PATH: backend/src/Ignixa.Lab.Functions/publish
  AZURE_FUNCTIONAPP_NAME: ignixa-lab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Pack local suites package
        shell: pwsh
        run: ./backend/pack-suites.ps1

      - name: Restore
        run: dotnet restore Ignixa.Lab.sln

      - name: Build
        run: dotnet build Ignixa.Lab.sln -c Release --no-restore

      - name: Publish
        run: >
          dotnet publish "${{ env.DOTNET_PROJECT_PATH }}"
          -c Release
          --no-build
          -o "${{ env.DOTNET_PUBLISH_PATH }}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.DOTNET_PUBLISH_PATH }}
          remote-build: false
