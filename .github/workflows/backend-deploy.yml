name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'nuget.config'
      - 'Ignixa.Lab.sln'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_PROJECT_PATH: backend/src/Ignixa.Lab.Functions/Ignixa.Lab.Functions.csproj
  DOTNET_PUBLISH_PATH: backend/src/Ignixa.Lab.Functions/publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Ignixa.Lab.sln

      - name: Build
        run: dotnet build Ignixa.Lab.sln -c Release --no-restore

      - name: Publish
        run: >
          dotnet publish "${{ env.DOTNET_PROJECT_PATH }}"
          -c Release
          --no-build
          -o "${{ env.DOTNET_PUBLISH_PATH }}"

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.DOTNET_PUBLISH_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
