name: Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'nuget.config'
      - 'Ignixa.Lab.sln'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'nuget.config'
      - 'Ignixa.Lab.sln'
      - '.github/workflows/backend.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Ignixa.Lab.sln

      - name: Build
        run: dotnet build Ignixa.Lab.sln -c Release --no-restore

      - name: Test
        run: dotnet test Ignixa.Lab.sln -c Release --no-build --verbosity normal
